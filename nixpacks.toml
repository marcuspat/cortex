[phases.setup]
nixPkgs = ["nodejs-20"]
aptPkgs = ["python3", "make", "g++"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx prisma generate",
  "NODE_ENV=production NEXT_BUILD=1 npm run build"
]

[phases.start]
cmd = "npx prisma db push --skip-generate --accept-data-loss && node .next/standalone/server.js"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 10
